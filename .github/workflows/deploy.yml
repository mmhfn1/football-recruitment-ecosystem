name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        # NOTE: `enablement: true` is NOT used here. It requires a token
        # with elevated permissions (a PAT with the `repo` scope, or a
        # GitHub App with `administration:write` + `pages:write`) — the
        # default GITHUB_TOKEN this workflow uses does not have those
        # rights, so enablement:true would silently fail to do anything.
        # Pages must be enabled once, manually, in repo Settings → Pages →
        # Source → "GitHub Actions" before this workflow's first run.
        # See the README's "Deploying to GitHub Pages" section.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the static site — index.html lives here,
          # and assets/ contains the css/js/data the page fetches at runtime.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
